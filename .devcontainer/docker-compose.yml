services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: hermes-agent-devcontainer
    init: true
    tty: true
    environment:
      TZ: Asia/Tokyo
    volumes:
      - ..:/workspaces/hermes-agent:cached
      - uv-cache:/root/.cache/uv
      - zsh-history:/root/.local/share/zsh
    command: sleep infinity

volumes:
  uv-cache:
  zsh-history:
